<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub-Finder</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- footer h ye  -->
    <footer class="footer">
        <h1>GitHub Finder</h1>
        <div class="footer-search">
            <input type="text" id="Username-input" placeholder="Enter the Github Username....">
            <button id="Searchbtn">Search</button>
        </div>
    </footer>
    <!-- loading-screen show -->
    <div id="loading-screen" style="display: none; text-align: center; padding: 20px;">
        <h2 style="color: #310128a8;">Fetching data... please wait :-)) </h2>
    </div>

    <!-- container containing profile details -->
    <div class="container profile_info">
        <div class="profile">
        </div>
    </div>


    <!--  -->
    <div class="container repositories">
        <h2>Repositories</h2>
        <!-- <input type="text" class="searchrepo" placeholder="Filter here..."> -->

        <!-- reposearch and sort krne ke liye  -->
        <div class="repo-controls" style="display: none;">
            <input type="text" id="repo-search" placeholder="Search repos...">
            <select id="repo-sort" class="repo-sort">
                <option value="default">Sort by...</option>
                <option value="stars">Stars (High to Low)</option>
                <option value="forks">Forks (High to Low)</option>
            </select>
        </div>
    </div>



    <!-- repo ki grid h iske ander -->
    <div id="repo-cards" class="container repo-cards"></div>

    <!-- card h jo pop up ho ga after click of repo -->
    <div class="repo-in-details">
        <div class="repo-detail-content">
            <div style="display: flex;">
                <h2></h2>
                <span class="closebtn"> <button>Close</button></span>
            </div>
            <div class="repo-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
